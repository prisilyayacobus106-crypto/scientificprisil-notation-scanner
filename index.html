<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected Choco-Pink Scanner 🍫💗</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-choco: #5D4037;
            --milk-choco: #8D6E63;
            --soft-pink: #F8BBD0;
            --hot-pink: #F48FB1;
            --bg-cream: #FFF5F7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            display: flex;
            background: white;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.1);
            border: 8px solid var(--soft-pink);
            max-width: 850px;
            width: 100%;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
        }

        /* --- Panel Kiri: Scanner --- */
        .scanner-panel {
            flex: 1.2;
            padding: 40px;
            border-right: 3px dashed var(--soft-pink);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { color: var(--dark-choco); margin-top: 0; }
        p { color: var(--milk-choco); font-size: 0.9rem; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 20px;
            border: 3px solid var(--soft-pink);
            border-radius: 20px;
            outline: none;
            font-size: 1.3rem;
            color: var(--dark-choco);
            box-sizing: border-box;
            background: var(--bg-cream);
            text-align: center;
            font-weight: bold;
        }

        .scan-btn {
            background-color: var(--dark-choco);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .scan-btn:hover { background: var(--milk-choco); transform: scale(1.05); }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            display: none;
            min-height: 40px;
        }

        /* --- Panel Kanan: Keypad Kalkulator --- */
        .calc-panel {
            flex: 1;
            background-color: var(--bg-cream);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .calc-title { color: var(--milk-choco); margin-bottom: 15px; font-size: 1rem; font-weight: bold; }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }

        .btn {
            background: white;
            border: 2px solid var(--soft-pink);
            padding: 18px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--dark-choco);
            transition: 0.2s;
            font-family: 'Quicksand', sans-serif;
        }

        .btn:hover { background: var(--soft-pink); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn.op { background: var(--soft-pink); color: white; border: none; }
        .btn.del { background: #FFCDD2; color: #C62828; border: none; }
        .btn.clear { background: var(--milk-choco); color: white; border: none; grid-column: span 2; }

        .valid { background-color: #E8F5E9; color: #2E7D32; border: 2px solid #A5D6A7; }
        .invalid { background-color: #FFEBEE; color: #C62828; border: 2px solid #EF9A9A; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="scanner-panel">
        <h2>Scientific Scanner 🍓</h2>
        <p>Click the buttons on the right to enter a number</p>
        
        <input type="text" id="userInput" placeholder="0" readonly>
        
        <button class="scan-btn" onclick="scanNow()">Scan Now! ✨</button>
        
        <div id="result"></div>
    </div>

    <div class="calc-panel">
        <div class="calc-title">INPUT HELPER 💗</div>
        <div class="calc-grid">
            <button class="btn clear" onclick="clearInput()">CLEAR</button>
            <button class="btn del" onclick="deleteLast()">⌫</button>
            <button class="btn op" onclick="addChar('e')">e</button>
            
            <button class="btn" onclick="addChar('7')">7</button>
            <button class="btn" onclick="addChar('8')">8</button>
            <button class="btn" onclick="addChar('9')">9</button>
            <button class="btn op" onclick="addChar('+')">+</button>
            
            <button class="btn" onclick="addChar('4')">4</button>
            <button class="btn" onclick="addChar('5')">5</button>
            <button class="btn" onclick="addChar('6')">6</button>
            <button class="btn op" onclick="addChar('-')">-</button>
            
            <button class="btn" onclick="addChar('1')">1</button>
            <button class="btn" onclick="addChar('2')">2</button>
            <button class="btn" onclick="addChar('3')">3</button>
            <button class="btn op" onclick="addChar('.')">.</button>
            
            <button class="btn" style="grid-column: span 3;" onclick="addChar('0')">0</button>
            <button class="btn op" onclick="addChar('E')">E</button>
        </div>
    </div>
</div>

<script>
    const inputField = document.getElementById('userInput');
    const resultDiv = document.getElementById('result');

    // Menambah karakter ke input
    function addChar(char) {
        if (inputField.value === "0") {
            inputField.value = char;
        } else {
            inputField.value += char;
        }
        // Sembunyikan hasil lama saat sedang mengetik baru
        resultDiv.style.display = "none";
    }

    // Menghapus semua isi input
    function clearInput() {
        inputField.value = "";
        resultDiv.style.display = "none";
    }

    // Menghapus satu karakter terakhir
    function deleteLast() {
        inputField.value = inputField.value.slice(0, -1);
        if (inputField.value === "") inputField.value = "";
        resultDiv.style.display = "none";
    }

    // Logika Scan (Regex)
    function scanNow() {
        const val = inputField.value;
        const scientificRegex = /^[+-]?[0-9]+(\.[0-9]+)?[eE][+-]?[0-9]+$/;

        if (val.trim() === "") {
            alert("Please enter a number first!");
            return;
        }

        resultDiv.style.display = "block";

        if (scientificRegex.test(val)) {
            resultDiv.innerHTML = "✨ VALID!<br>Scientific Notation Detected.";
            resultDiv.className = "valid";
        } else {
            resultDiv.innerHTML = "❌ INVALID!<br>Not a Scientific Notation.";
            resultDiv.className = "invalid";
        }
    }
</script>

</body>
</html>
